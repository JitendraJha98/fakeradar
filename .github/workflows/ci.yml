name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff (pinned to match pre-commit)
        run: pip install ruff==0.5.5
      - name: Lint
        run: ruff check src tests
      - name: Format check
        run: ruff format --check src tests

  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12"]
        include:
          - os: windows-latest
            python-version: "3.11"
          - os: macos-latest
            python-version: "3.11"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install PyTorch (CPU)
        shell: bash
        run: |
          # macOS wheels live on PyPI; the cpu index only serves Linux/Windows.
          if [ "${{ runner.os }}" = "macOS" ]; then
            pip install torch torchvision
          else
            pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          fi
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Tests
        run: pytest -q --cov=fakeradar --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
